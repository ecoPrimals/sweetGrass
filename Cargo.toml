[workspace]
resolver = "2"
members = [
    "crates/sweet-grass-core",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"
repository = "https://github.com/ecoPrimals/sweetGrass"
authors = ["ecoPrimals Project"]

[workspace.dependencies]
# SourDough core traits
sourdough-core = { path = "../sourDough/crates/sourdough-core" }

# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
