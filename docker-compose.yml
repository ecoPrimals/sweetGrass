# Docker Compose for SweetGrass Development and Testing
#
# This provides PostgreSQL for integration tests and development.
# Run: docker compose up -d
# Stop: docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: sweetgrass-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sweetgrass_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sweetgrass

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sweetgrass-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sweetgrass.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - sweetgrass
    profiles:
      - admin  # Only start with: docker-compose --profile admin up

volumes:
  postgres_data:
    driver: local

networks:
  sweetgrass:
    driver: bridge
