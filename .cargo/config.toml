# Local override: default CARGO_TARGET_DIR lives on a noexec mount (/mnt/4tb-work).
# This redirects build artifacts to an exec-capable filesystem.
# Other developers: set CARGO_TARGET_DIR in your env or adjust this path.
[build]
target-dir = "/path/to/.cargo-build/sweetGrass/target"

# Coverage aliases (ludoSpring V29 / ecosystem standard).
[alias]
coverage = "llvm-cov --all-features --workspace"
coverage-html = "llvm-cov --all-features --workspace --html"
coverage-json = "llvm-cov --all-features --workspace --json --output-path lcov.json"

# ecoBin cross-compilation targets (pure Rust, no C deps in production).
# Install with: rustup target add <target>
#
# Tier 1 (primary):
#   x86_64-unknown-linux-gnu    — Linux AMD64
#   aarch64-unknown-linux-gnu   — Linux ARM64 (Raspberry Pi 4+, cloud ARM)
#
# Tier 2 (portable):
#   x86_64-unknown-linux-musl   — Static Linux AMD64 (Alpine, containers)
#   aarch64-unknown-linux-musl  — Static Linux ARM64
#   armv7-unknown-linux-gnueabihf — Linux ARMv7 (Raspberry Pi 2/3)
#
# Tier 3 (experimental):
#   riscv64gc-unknown-linux-gnu — RISC-V 64-bit
