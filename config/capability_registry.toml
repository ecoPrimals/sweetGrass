# sweetGrass Capability Registry
# biomeOS-compatible runtime capability overlay.
# See: wateringHole SPRING_AS_NICHE_DEPLOYMENT_STANDARD
#
# biomeOS reads this file to discover sweetGrass capabilities
# without requiring the primal to be running.

[primal]
name = "sweetgrass"
version = "0.7.45"
description = "Semantic provenance and attribution layer"
license = "AGPL-3.0-or-later"
protocol = "jsonrpc-2.0"
transport = ["http", "uds", "tcp"]

[domains.braid]
description = "Provenance record lifecycle"
methods = ["create", "get", "get_by_hash", "query", "delete", "commit", "anchor"]

[domains.anchoring]
description = "Cryptographic anchoring and verification"
methods = ["anchor", "verify"]

[domains.provenance]
description = "Provenance graph traversal and export"
methods = ["graph", "export_provo", "export_graph_provo"]

[domains.attribution]
description = "Fair credit attribution and reward calculation"
methods = ["chain", "calculate_rewards", "top_contributors", "witness"]

[domains.compression]
description = "Session compression and meta-braid creation"
methods = ["compress_session", "create_meta_braid"]

[domains.contribution]
description = "Contribution recording and dehydration intake"
methods = ["record", "record_session", "record_dehydration", "record_provenance"]

[domains.health]
description = "Health, liveness, and readiness probes"
methods = ["check", "liveness", "readiness"]

[domains.pipeline]
description = "Pipeline integration for provenance-trio coordination"
methods = ["attribute"]

[domains.capabilities]
description = "Capability discovery (canonical per wateringHole v2.1)"
methods = ["list"]

[domains.capability]
description = "Capability discovery (alias)"
methods = ["list"]

[domains.identity]
description = "Primal identity"
methods = ["get"]

[domains.auth]
description = "Authorization and method gate status"
methods = ["check", "mode", "peer_info"]

[domains.lifecycle]
description = "Runtime lifecycle"
methods = ["status"]

[domains.composition]
description = "Ecosystem composition health probes"
methods = ["tower_health", "node_health", "nest_health", "nucleus_health"]

[domains.tools]
description = "MCP tool exposure for Squirrel AI coordination"
methods = ["list", "call"]

# Per-operation metadata for biomeOS dispatch graph
# Stability tiers: "stable" (Wire Standard locked), "beta" (API may evolve),
#                  "experimental" (subject to change)

[operations."braid.create"]
depends_on = []
cost = "low"
stability = "stable"

[operations."braid.get"]
depends_on = []
cost = "low"
stability = "stable"

