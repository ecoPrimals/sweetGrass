# SweetGrass Dependency Audit Configuration
# cargo-deny configuration for primal sovereignty

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Deny gRPC/protobuf dependencies - Primal Sovereignty
deny = [
    # gRPC and protobuf - FORBIDDEN (C++ toolchain, vendor lock-in)
    { name = "tonic", wrappers = [] },
    { name = "prost", wrappers = [] },
    { name = "prost-types", wrappers = [] },
    { name = "protobuf", wrappers = [] },
    { name = "grpcio", wrappers = [] },
    
    # OpenSSL - prefer rustls
    { name = "openssl", wrappers = [] },
    { name = "openssl-sys", wrappers = [] },
]

skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
